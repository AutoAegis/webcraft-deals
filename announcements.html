<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Announcements — AutoCode</title>
  <meta name="description" content="Latest updates and news from AutoCode." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="nav-root"></div>
  <main class="container" style="max-width:48rem;padding:8rem 1.5rem 6rem">
    <div class="kicker">News</div>
    <h1 style="font-size:clamp(2.5rem,5vw,3.5rem);font-weight:700">Announcements</h1>
    <p class="muted" style="margin-top:.75rem">Updates, releases, and news from AutoCode.</p>
    <div id="admin-form" style="display:none;margin-top:2rem"></div>
    <p id="signin-cta" class="muted" style="font-size:.9rem;margin-top:1.5rem;display:none"><a class="primary" href="auth.html" style="text-decoration:underline">Sign in</a> to your account to comment on future announcements.</p>
    <div id="list" style="margin-top:2rem;display:flex;flex-direction:column;gap:1rem"></div>
  </main>
  <div id="footer-root"></div>
  <script type="module">
    import { sb, ok, err, esc, renderNav, renderFooter, onAuthChange, adminSig, bindImageUpload } from "./assets/app.js";
    renderNav("news"); renderFooter();
    let isAdmin = false;
    async function load() {
      const { data } = await sb.from("announcements").select("*").order("pinned", { ascending: false }).order("created_at", { ascending: false });
      const list = document.getElementById("list");
      if (!data || data.length === 0) { list.innerHTML = `<div class="card dashed">No announcements yet.</div>`; return; }
      list.innerHTML = data.map(a => `
        <div class="card">
          <div class="between" style="align-items:flex-start;gap:1rem">
            <div>
              <div style="display:flex;align-items:center;gap:.5rem">
                ${a.pinned ? `<span class="badge badge-primary">📌 Pinned</span>` : ""}
                <h3 style="font-size:1.4rem;font-weight:700">${esc(a.title)}</h3>
              </div>
              <div style="margin-top:.5rem;display:flex;align-items:center;gap:.75rem">
                ${adminSig}
                <span class="font-mono uppercase muted" style="font-size:.7rem">${new Date(a.created_at).toLocaleDateString()}</span>
              </div>
            </div>
            ${isAdmin ? `<button class="btn btn-outline btn-sm" data-del="${a.id}">🗑</button>` : ""}
          </div>
          <p style="margin-top:1rem;white-space:pre-wrap">${esc(a.body)}</p>
          ${a.image_url ? `<img src="${esc(a.image_url)}" alt="${esc(a.title)}" style="margin-top:1rem;border:1px solid var(--border);border-radius:6px;max-height:24rem;width:auto">` : ""}
        </div>`).join("");
      if (isAdmin) list.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
        if (!confirm("Delete this announcement?")) return;
        const { error } = await sb.from("announcements").delete().eq("id", b.dataset.del);
        if (error) { err(error.message); return; }
        ok("Deleted."); load();
      });
    }
    onAuthChange(({ user, isAdmin: a }) => {
      isAdmin = a;
      document.getElementById("signin-cta").style.display = !user ? "" : "none";
      const root = document.getElementById("admin-form");
      if (!a) { root.style.display = "none"; load(); return; }
      root.style.display = "";
      root.innerHTML = `
        <div class="card" style="border-color:color-mix(in oklab,var(--primary) 40%,transparent)">
          <h2 style="font-weight:700;font-size:1.1rem">New announcement</h2>
          <form id="an-form" style="margin-top:1rem;display:flex;flex-direction:column;gap:1rem">
            <div><label class="lbl">Title</label><input id="an-title" maxlength="120" required></div>
            <div><label class="lbl">Body</label><textarea id="an-body" maxlength="4000" rows="5" required></textarea></div>
            <label class="checkbox"><input id="an-pin" type="checkbox"> Pin to top</label>
            <div>
              <label class="lbl">Image (optional)</label>
              <div class="upload-box">
                <input id="an-img-file" type="file" accept="image/*">
                <div id="an-img-prev"></div>
                <button type="button" class="btn btn-outline btn-sm" id="an-img-rm" style="display:none">Remove</button>
              </div>
              <input id="an-img-url" type="hidden">
            </div>
            <button class="btn btn-hero" type="submit">Post announcement</button>
          </form>
        </div>`;
      bindImageUpload({ inputId: "an-img-file", urlInputId: "an-img-url", previewId: "an-img-prev", removeId: "an-img-rm" });
      document.getElementById("an-form").onsubmit = async (e) => {
        e.preventDefault();
        const title = document.getElementById("an-title").value.trim();
        const body = document.getElementById("an-body").value.trim();
        if (!title || !body) { err("Title and body are required."); return; }
        const { error } = await sb.from("announcements").insert({
          title, body,
          pinned: document.getElementById("an-pin").checked,
          image_url: document.getElementById("an-img-url").value || null,
        });
        if (error) { err(error.message); return; }
        ok("Announcement posted.");
        document.getElementById("an-form").reset();
        document.getElementById("an-img-url").value = "";
        document.getElementById("an-img-prev").innerHTML = "";
        document.getElementById("an-img-rm").style.display = "none";
        load();
      };
      load();
    });
  </script>
</body>
</html>
