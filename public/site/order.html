<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Confirm your order — AutoCode</title>
  <meta name="description" content="Review your selection and send your project request." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="nav-root"></div>
  <main class="container" style="max-width:64rem;padding:8rem 1.5rem 6rem">
    <div class="kicker">Confirm</div>
    <h1 style="font-size:clamp(2rem,5vw,3rem);font-weight:700">Review & send your request</h1>
    <p class="muted" style="margin-top:.75rem">Take one last look, tell me about your project, and send it across. I'll reply within 24h.</p>
    <div class="cols-5" style="margin-top:2.5rem">
      <div class="summary-card" style="position:static">
        <div class="font-mono uppercase" style="font-size:.7rem;opacity:.7">Your selection</div>
        <div id="sum-title" style="font-size:1.5rem;font-weight:700;margin-top:.4rem">—</div>
        <ul id="sum-lines" style="margin-top:1rem;list-style:none;padding:0;display:flex;flex-direction:column;gap:.5rem;font-family:var(--font-mono);font-size:.9rem"></ul>
      </div>
      <div class="card">
        <form id="order-form" style="display:flex;flex-direction:column;gap:1.25rem">
          <div><label class="lbl">What is your website / project about? *</label><textarea id="about" required maxlength="2000" rows="5" placeholder="e.g. A booking site for my dog grooming business in Leeds."></textarea></div>
          <div style="display:grid;gap:1rem;grid-template-columns:1fr 1fr">
            <div><label class="lbl">Your name</label><input id="cname" maxlength="80"></div>
            <div><label class="lbl">Phone (optional)</label><input id="phone" maxlength="32"></div>
          </div>
          <div><label class="lbl">Additional comments</label><textarea id="comments" maxlength="2000" rows="4" placeholder="Deadlines, references, examples you like, etc."></textarea></div>
          <div class="font-mono muted" style="font-size:.75rem">Sending as <span class="primary" id="from-email">…</span>. Pressing send opens your email app with everything pre-filled.</div>
          <div style="display:flex;flex-wrap:wrap;gap:.75rem">
            <button class="btn btn-hero btn-lg" type="submit">✉ Send request →</button>
            <a class="btn btn-outline btn-lg" href="index.html">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>
  <div id="footer-root"></div>
  <script type="module">
    import { sb, renderNav, renderFooter, onAuthChange, ADMIN_EMAIL, qs } from "./assets/app.js";
    renderNav(); renderFooter();
    const search = qs();
    let user = null, displayName = "";
    function buildSummary() {
      if (search.type === "package") return { title: `${search.name ?? "Package"} package`, lines: [`Package: ${search.name}`, `Price: £${search.price ?? "—"}`] };
      const picked = search.picked ? search.picked.split(",").filter(Boolean) : [];
      const lines = ["Type: Custom build", `Design tier: ${search.design ?? "—"}`, `Pages: ${search.pages ?? "—"}`, `Add-ons: ${picked.length ? picked.join(", ") : "none"}`, `Rush delivery: ${search.rush ? "Yes (+30%)" : "No"}`];
      if (search.promo) lines.push(`Promo code: ${search.promo} (${search.promoPct}% off)`);
      lines.push(`Estimated total: £${search.total ?? "—"}`);
      return { title: "Custom project", lines };
    }
    const summary = buildSummary();
    document.getElementById("sum-title").textContent = summary.title;
    document.getElementById("sum-lines").innerHTML = summary.lines.map(l => `<li>${l.replace(/</g,"&lt;")}</li>`).join("");
    onAuthChange(async ({ user: u }) => {
      user = u;
      if (!u) { location.href = "auth.html"; return; }
      document.getElementById("from-email").textContent = u.email;
      const { data } = await sb.from("profiles").select("display_name").eq("user_id", u.id).maybeSingle();
      displayName = data?.display_name ?? "";
      document.getElementById("cname").value = displayName;
    });
    document.getElementById("order-form").onsubmit = (e) => {
      e.preventDefault();
      const about = document.getElementById("about").value.trim();
      if (!about) return;
      const subject = `New project request — ${summary.title}`;
      const body = ["Hi Auto,", "", "I'd like to go ahead with the following:", "", "--- ORDER ---", ...summary.lines, "--- /ORDER ---", "", "About my website / project:", about, "", "Additional comments:", document.getElementById("comments").value || "(none)", "", "--- CONTACT ---", `Name: ${document.getElementById("cname").value || displayName}`, `Email: ${user?.email ?? ""}`, `Phone: ${document.getElementById("phone").value || "(not provided)"}`, "", "Thanks!"].join("\n");
      location.href = `mailto:${ADMIN_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    };
  </script>
</body>
</html>
