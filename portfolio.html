<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio — AutoCode</title>
  <meta name="description" content="Selected websites and apps built by AutoCode." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="nav-root"></div>
  <main class="container" style="padding:8rem 1.5rem 6rem">
    <div class="kicker">Work</div>
    <h1 style="font-size:clamp(2.5rem,5vw,3.5rem);font-weight:700">Portfolio</h1>
    <p class="muted" style="margin-top:.75rem;max-width:36rem">A selection of recent sites and apps. Each one shipped fast, hand-coded, and built to last.</p>
    <div id="admin-form" style="display:none;margin-top:2.5rem"></div>
    <div id="grid" class="cols-3" style="margin-top:3rem"></div>
  </main>
  <div id="footer-root"></div>
  <script type="module">
    import { sb, ok, err, esc, renderNav, renderFooter, onAuthChange, adminSig, bindImageUpload } from "./assets/app.js";
    renderNav("portfolio"); renderFooter();
    const grid = document.getElementById("grid");
    let isAdmin = false;
    async function load() {
      const { data } = await sb.from("portfolio_projects").select("*").order("sort_order", { ascending: true }).order("created_at", { ascending: false });
      if (!data || data.length === 0) { grid.innerHTML = `<div class="card dashed" style="grid-column:1/-1">No projects yet.</div>`; return; }
      grid.innerHTML = data.map(p => `
        <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column">
          ${p.image_url ? `<div style="aspect-ratio:16/9;overflow:hidden;background:var(--muted)"><img src="${esc(p.image_url)}" alt="${esc(p.title)}" style="width:100%;height:100%;object-fit:cover"></div>` : ""}
          <div style="padding:1.5rem;display:flex;flex-direction:column;flex:1">
            <div class="between" style="align-items:flex-start;gap:.5rem">
              <h3 style="font-size:1.25rem;font-weight:700">${esc(p.title)}</h3>
              ${isAdmin ? `<button data-del="${p.id}" style="background:none;border:none;color:var(--muted-foreground);cursor:pointer">🗑</button>` : ""}
            </div>
            <div style="margin-top:.4rem">${adminSig}</div>
            <p class="muted" style="font-size:.9rem;margin-top:.5rem;flex:1">${esc(p.description)}</p>
            ${(p.tech || []).length ? `<div style="margin-top:.75rem">${p.tech.map(t => `<span class="tag">${esc(t)}</span>`).join("")}</div>` : ""}
            ${p.project_url ? `<a class="primary font-mono uppercase" style="margin-top:.75rem;font-size:.85rem" target="_blank" rel="noreferrer" href="${esc(p.project_url)}">Visit ↗</a>` : ""}
          </div>
        </div>`).join("");
      if (isAdmin) grid.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
        if (!confirm("Delete this project?")) return;
        await sb.from("portfolio_projects").delete().eq("id", b.dataset.del); load();
      });
    }
    onAuthChange(({ isAdmin: a }) => {
      isAdmin = a;
      const root = document.getElementById("admin-form");
      if (!a) { root.style.display = "none"; load(); return; }
      root.style.display = "";
      root.innerHTML = `
        <div class="card" style="border-color:color-mix(in oklab,var(--primary) 40%,transparent)">
          <h2 style="font-weight:700;font-size:1.1rem">Add a project</h2>
          <form id="pf-form" style="margin-top:1rem;display:grid;gap:1rem;grid-template-columns:1fr 1fr">
            <div><label class="lbl">Title</label><input id="pf-title" maxlength="120" required></div>
            <div><label class="lbl">Sort order</label><input id="pf-sort" type="number" value="0"></div>
            <div style="grid-column:1/-1"><label class="lbl">Description</label><textarea id="pf-desc" maxlength="800" rows="3" required></textarea></div>
            <div>
              <label class="lbl">Image (upload)</label>
              <div class="upload-box">
                <input id="pf-img-file" type="file" accept="image/*">
                <div id="pf-img-prev"></div>
                <button type="button" class="btn btn-outline btn-sm" id="pf-img-rm" style="display:none">Remove</button>
              </div>
              <input id="pf-img-url" type="hidden">
            </div>
            <div><label class="lbl">Project URL</label><input id="pf-url" type="url" placeholder="https://..."></div>
            <div style="grid-column:1/-1"><label class="lbl">Tech (comma separated)</label><input id="pf-tech" placeholder="React, Tailwind, Supabase"></div>
            <div style="grid-column:1/-1"><button class="btn btn-hero" type="submit">Add project</button></div>
          </form>
        </div>`;
      bindImageUpload({ inputId: "pf-img-file", urlInputId: "pf-img-url", previewId: "pf-img-prev", removeId: "pf-img-rm" });
      document.getElementById("pf-form").onsubmit = async (e) => {
        e.preventDefault();
        const tech = document.getElementById("pf-tech").value.split(",").map(s => s.trim()).filter(Boolean);
        const { error } = await sb.from("portfolio_projects").insert({
          title: document.getElementById("pf-title").value.trim(),
          description: document.getElementById("pf-desc").value.trim(),
          image_url: document.getElementById("pf-img-url").value || null,
          project_url: document.getElementById("pf-url").value.trim() || null,
          tech,
          sort_order: parseInt(document.getElementById("pf-sort").value, 10) || 0,
        });
        if (error) { err(error.message); return; }
        ok("Project added.");
        document.getElementById("pf-form").reset();
        document.getElementById("pf-img-url").value = "";
        document.getElementById("pf-img-prev").innerHTML = "";
        document.getElementById("pf-img-rm").style.display = "none";
        load();
      };
      load();
    });
  </script>
</body>
</html>
